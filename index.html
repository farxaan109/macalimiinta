<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL XIKMA SCHOOL - Attendance</title>
    <style>
        /* Midabka dhabarka (Background) oo cagaar khafif ah */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            width: 350px; 
            text-align: center; 
            border-top: 6px solid #2e7d32;
        }
        /* Style-ka Logada */
        .logo {
            width: 100px;
            height: 100px;
            margin-bottom: 15px;
            border-radius: 50%;
        }
        h2 { color: #2c3e50; border-bottom: 2px solid #28a745; display: inline-block; padding-bottom: 5px; margin-top: 0; }
        select, input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .submit-btn { background-color: #28a745; color: white; padding: 15px; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-size: 17px; font-weight: bold; margin-top: 10px; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        #status { margin-top: 15px; font-weight: bold; font-size: 14px; }
        .success-msg { color: #2e7d32; }
        .success-msg h1 { font-size: 40px; margin-bottom: 10px; }
        .success-msg p { font-size: 18px; color: #333; line-height: 1.5; }
        /* Saacadda tiri xisaabta (Countdown) */
        #timer { font-size: 12px; color: #999; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <img src="10754.jpg" alt="Logo" class="logo">
    
    <h2 id="displaySchoolName">AL XIKMA SCHOOL</h2>
    <p>Xaadirinta Macalimiinta</p>

    <select id="nameSelect">
        <option value="">-- Sugaya Magacyada... --</option>
    </select>

    <select id="shiftSelect">
        <option value="">-- Dooro Xaaladda --</option>
        <option value="subax imaansho">Subax Imaansho</option>
        <option value="subax bixitaan">Subax Bixitaan</option>
        <option value="galab imaansho">Galab Imaansho</option>
        <option value="galab bixitaan">Galab Bixitaan</option>
    </select>

    <input type="password" id="passInput" placeholder="Gali Password-kaaga">

    <button id="submitBtn" class="btn submit-btn" disabled>Hubinta Goobta...</button>
    <div id="status">Sugaya GPS-ka iyo Settings...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBaYvZ8Wpx9-hNX1fyWKCxbA2ysvQCHYm4",
        authDomain: "alxikma-attendance-bfac1.firebaseapp.com",
        databaseURL: "https://alxikma-attendance-bfac1-default-rtdb.firebaseio.com",
        projectId: "alxikma-attendance-bfac1",
        storageBucket: "alxikma-attendance-bfac1.appspot.com",
        messagingSenderId: "782229241085",
        appId: "1:782229241085:web:0245c6cae8da2080fd1294"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let TEACHER_DB = {}; 
    let SETTINGS = {};

    db.ref('settings').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            SETTINGS = data;
            document.getElementById('displaySchoolName').innerText = SETTINGS.school_name || "AL XIKMA SCHOOL";
            startGPSWatch();
        }
    });

    db.ref('staff_list').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            TEACHER_DB = data;
            const nameSelect = document.getElementById('nameSelect');
            nameSelect.innerHTML = '<option value="">-- Dooro Magacaaga --</option>';
            Object.keys(data).sort().forEach(name => {
                nameSelect.innerHTML += `<option value="${name}">${name}</option>`;
            });
        }
    });

    function parseTime(t) {
        if (!t) return 0;
        let timeStr = String(t);
        if (timeStr.includes("T")) {
            timeStr = timeStr.split("T")[1];
        }
        const parts = timeStr.split(':');
        const h = parseInt(parts[0]) || 0;
        const m = parseInt(parts[1]) || 0;
        return h * 60 + m;
    }

    function startGPSWatch() {
        navigator.geolocation.watchPosition((pos) => {
            const now = new Date();
            const currentTime = now.getHours() * 60 + now.getMinutes();
            const shift = document.getElementById('shiftSelect').value.toLowerCase();
            
            const R = 6371; 
            const lat1 = pos.coords.latitude, lon1 = pos.coords.longitude;
            const dLat = (SETTINGS.lat - lat1) * Math.PI / 180;
            const dLon = (SETTINGS.lon - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(SETTINGS.lat*Math.PI/180) * Math.sin(dLon/2)**2;
            const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            const status = document.getElementById('status');
            const submitBtn = document.getElementById('submitBtn');

            let timeStatusMsg = "";
            let canSubmit = true;

            if (String(SETTINGS.time_limit_on).toLowerCase() === "true" && shift !== "") {
                let start, end;
                
                if (shift === "subax imaansho") {
                    start = parseTime(SETTINGS.morn_start);
                    end = parseTime(SETTINGS.morn_end);
                } else if (shift === "subax bixitaan") {
                    start = parseTime(SETTINGS.morn_out_start);
                    end = parseTime(SETTINGS.morn_out_end);
                } else if (shift === "galab imaansho") {
                    start = parseTime(SETTINGS.aft_start);
                    end = parseTime(SETTINGS.aft_end);
                } else if (shift === "galab bixitaan") {
                    start = parseTime(SETTINGS.aft_out_start);
                    end = parseTime(SETTINGS.aft_out_end);
                }

                if (currentTime < start) {
                    timeStatusMsg = "❌ Lama gaarin waqtigii " + shift + ".";
                    canSubmit = false;
                } else if (currentTime > end) {
                    timeStatusMsg = "❌ Waa la soo dhaafay waqtigii " + shift + ".";
                    canSubmit = false;
                }
            }

            if (!canSubmit) {
                status.innerText = timeStatusMsg;
                status.style.color = "orange";
                submitBtn.disabled = true;
                submitBtn.innerText = "WAA XIRAN YAHAY";
            } else if (dist <= SETTINGS.radius) {
                status.innerText = "✅ Hadda iskuulka waad joogtaa .";
                status.style.color = "green";
                submitBtn.disabled = false;
                submitBtn.innerText = "XAADIRI";
            } else {
                status.innerText = (SETTINGS.msg_far || "Ma joogtid iskuulka fadlan marka hore iskuulka tag") + " (" + (dist*1000).toFixed(0) + "m).";
                status.style.color = "red";
                submitBtn.disabled = true;
                submitBtn.innerText = "HUBINTA GOOBTA...";
            }
        }, null, { enableHighAccuracy: true });
    }

    document.getElementById('submitBtn').addEventListener('click', () => {
        const name = document.getElementById('nameSelect').value;
        const shift = document.getElementById('shiftSelect').value;
        const pass = document.getElementById('passInput').value;

        if (!name || !shift || !pass) return alert("Fadlan buuxi dhamaan khaanadaha!");
        if (!TEACHER_DB[name] || String(TEACHER_DB[name].pass) !== String(pass)) return alert("Password-ku waa khaldan yahay!");

        const maanta = new Date().toLocaleDateString('en-GB');

        db.ref('attendance').orderByChild('name').equalTo(name).once('value', (snapshot) => {
            let horay_u_jiray = false;
            snapshot.forEach((child) => {
                const record = child.val();
                const recordDate = new Date(record.time).toLocaleDateString('en-GB');
                if (record.shift === shift && recordDate === maanta) horay_u_jiray = true;
            });

            if (horay_u_jiray) {
                alert("❌ Hore ayaad isugu xaadirisay " + shift + " maanta hal mar ayaa laguu ogol yahay maalintii!");
            } else {
                // Halkan waxaa lagu daray inuu aqoonsado UNIQUE ID-ga fariinta
                const newRecordRef = db.ref('attendance').push();
                const uniqueId = newRecordRef.key;

                newRecordRef.set({
                    name: name,
                    email: TEACHER_DB[name].email || "",
                    shift: shift,
                    time: firebase.database.ServerValue.TIMESTAMP
                }).then(() => {
                    // Muuji shaashadda sugitaanka
                    document.getElementById('mainContainer').innerHTML = `
                        <div class="success-msg">
                            <h1 id="status-icon">⏳</h1>
                            <p><strong>${name}</strong></p>
                            <p id="dynamic-msg">Fariintaada waa la xisaabinayaa...</p>
                            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
                            <p style="font-size: 12px; color: #666;">${SETTINGS.footer_text || ""}</p>
                            <p id="timer">Boggu wuxuu iskiis u xirmi doonaa...</p>
                        </div>`;

                    // Dhagayso Firebase ilaa Google Sheets uu ka soo diro "display_msg"
                    db.ref('attendance/' + uniqueId).on('value', (snapshot) => {
                        const data = snapshot.val();
                        if (data && data.display_msg) {
                            document.getElementById('dynamic-msg').innerHTML = `<b>${data.display_msg}</b>`;
                            document.getElementById('status-icon').innerHTML = "✅";
                        }
                    });

                    setTimeout(() => { location.reload(); }, 300000); 
                });
            }
        });
    });
</script>
</body>
</html>
